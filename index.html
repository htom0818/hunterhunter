<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HUNTER×HUNTER 暗黒大陸編 STORY GUIDE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <video id="bgVideo" class="bg-video" autoplay muted loop playsinline>
    <source src="assets/video/opening.mp4" type="video/mp4">
  </video>
  <div class="bg-overlay"></div>
  <section id="intro" class="intro-screen">
    <div class="intro-inner">
      <div class="eyebrow type-target" data-text="STORY GUIDE"></div>
      <h1 class="title type-target" data-text="HUNTER×HUNTER"></h1>
      <div class="subtitle type-target" data-text="暗黒大陸編"></div>
      <button id="enterBtn" class="enter-btn">ENTER</button>
    </div>
  </section>
  <main id="app" class="app hidden">
    <header class="app-header">
      <div class="header-kicker">STORY GUIDE</div>
      <h1>暗黒大陸編</h1>
    </header>
    <section class="search-panel">
      <label class="search-box"><span>⌕</span><input id="searchInput" type="search" placeholder="検索窓"></label>
      <nav class="menu-grid">
        <button data-view="episodes" class="menu-btn active">話数<small>EPISODES</small></button>
        <button data-view="characters" class="menu-btn">キャラクター<small>CHARACTERS</small></button>
        <button data-view="organizations" class="menu-btn">組織<small>ORGS</small></button>
        <button data-view="terms" class="menu-btn">用語<small>TERMS</small></button>
        <button data-view="storylines" class="menu-btn">ストーリーライン<small>STORYLINE</small></button>
        <button data-view="books" class="menu-btn">単行本<small>BOOKS</small></button>
      </nav>
    </section>
    <section class="home-section">
      <div class="section-title"><span>◆ CHARACTER</span><small>自動スクロール中</small></div>
      <div class="marquee-wrap"><div id="characterMarquee" class="character-marquee"></div></div>
    </section>
    <section class="home-section">
      <div class="section-title"><span>◆ BOOKS</span><small>自動スクロール中</small></div>
      <div class="book-wrap"><div id="bookMarquee" class="book-marquee"></div></div>
    </section>
    <section id="content" class="content-panel"></section>
    <section class="latest-card">
      <div><div class="latest-label">LATEST UPDATE</div><div class="latest-sub">最新の更新情報</div></div>
      <div class="latest-main"><div class="latest-thumb" id="latestThumb"></div><div><strong id="latestTitle">No345　著者</strong><span id="latestMeta">更新済み</span></div></div>
      <button class="round-btn" data-view="episodes">☰</button>
    </section>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
